<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Skin Laser & MedSpa</title>
<link rel="icon" type="image/png" href="../skin-laser-assets/favicon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #F6F3EE;
  --bg-warm: #EDE8E0;
  --white: #FDFCFA;
  --ink: #1B1B1B;
  --ink-soft: #3A3632;
  --ink-muted: #7A746B;
  --accent: #9E7C5E;
  --accent-deep: #846549;
  --navy: #2C2825;
  --serif: 'Playfair Display', Georgia, serif;
  --sans: 'DM Sans', system-ui, sans-serif;
  --ease: cubic-bezier(0.16, 1, 0.3, 1);
}

html, body {
  height: 100%;
  font-family: var(--sans);
  color: var(--ink);
  background: var(--bg);
  -webkit-font-smoothing: antialiased;
}

body {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1.5rem;
}

.login-card {
  width: 100%;
  max-width: 400px;
  background: var(--white);
  border-radius: 16px;
  padding: 3rem 2.5rem;
  box-shadow: 0 4px 24px rgba(0, 0, 0, 0.06), 0 1px 4px rgba(0, 0, 0, 0.04);
  text-align: center;
}

.login-card .logo {
  width: 160px;
  margin: 0 auto 2rem;
}

.login-card h1 {
  font-family: var(--serif);
  font-size: 1.5rem;
  font-weight: 500;
  color: var(--navy);
  margin-bottom: 0.5rem;
}

.login-card .subtitle {
  font-size: 0.85rem;
  color: var(--ink-muted);
  margin-bottom: 2rem;
}

.form-group {
  text-align: left;
  margin-bottom: 1.5rem;
}

.form-group label {
  display: block;
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-muted);
  margin-bottom: 0.5rem;
}

.form-group input {
  width: 100%;
  padding: 0.85rem 1rem;
  font-family: var(--sans);
  font-size: 0.95rem;
  color: var(--ink);
  background: var(--bg);
  border: 1.5px solid var(--bg-warm);
  border-radius: 10px;
  outline: none;
  transition: border-color 0.2s ease, box-shadow 0.2s ease;
}

.form-group input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(158, 124, 94, 0.1);
}

.btn-login {
  width: 100%;
  padding: 0.9rem;
  font-family: var(--sans);
  font-size: 0.9rem;
  font-weight: 600;
  letter-spacing: 0.04em;
  color: var(--white);
  background: var(--accent);
  border: none;
  border-radius: 10px;
  cursor: pointer;
  transition: background 0.2s ease, transform 0.15s ease;
}

.btn-login:hover {
  background: var(--accent-deep);
}

.btn-login:active {
  transform: scale(0.98);
}

.btn-login:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

.error-msg {
  display: none;
  margin-top: 1rem;
  padding: 0.75rem 1rem;
  font-size: 0.85rem;
  color: #9B3B3B;
  background: #FDF0F0;
  border: 1px solid #F5D5D5;
  border-radius: 8px;
}

.error-msg.visible {
  display: block;
}

.back-link {
  display: inline-block;
  margin-top: 1.5rem;
  font-size: 0.8rem;
  color: var(--ink-muted);
  text-decoration: none;
  transition: color 0.2s;
}

.back-link:hover {
  color: var(--accent);
}
</style>
</head>
<body>

<div class="login-card">
  <img src="../skin-laser-assets/logo.png" alt="Skin Laser & MedSpa" class="logo">
  <h1>Admin Login</h1>
  <p class="subtitle">Enter your password to access the dashboard</p>

  <form id="loginForm">
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter admin password" autocomplete="current-password" required>
    </div>
    <button type="submit" class="btn-login" id="loginBtn">Log In</button>
  </form>

  <div class="error-msg" id="errorMsg">Invalid password. Please try again.</div>

  <a href="/" class="back-link">Back to website</a>
</div>

<script>
const form = document.getElementById('loginForm');
const errorMsg = document.getElementById('errorMsg');
const loginBtn = document.getElementById('loginBtn');

form.addEventListener('submit', async (e) => {
  e.preventDefault();
  errorMsg.classList.remove('visible');
  loginBtn.disabled = true;
  loginBtn.textContent = 'Logging in...';

  const password = document.getElementById('password').value;

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password })
    });

    if (res.ok) {
      window.location.href = '/admin/';
    } else {
      const data = await res.json().catch(() => ({}));
      errorMsg.textContent = data.error || 'Invalid password. Please try again.';
      errorMsg.classList.add('visible');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  } catch (err) {
    errorMsg.textContent = 'Unable to connect. Please try again.';
    errorMsg.classList.add('visible');
  } finally {
    loginBtn.disabled = false;
    loginBtn.textContent = 'Log In';
  }
});
</script>

</body>
</html>
